name: careershield_ai
description: CareerShield AI - Protecting Students, Empowering Careers
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.2.0
  google_sign_in: ^7.2.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
